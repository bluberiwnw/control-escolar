<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividades - Portal del Profesor BUAP</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="university-logo">
                <i class="fas fa-university"></i>
            </div>
            <h2>Portal del Profesor</h2>
            <p>BUAP - FCC</p>
        </div>
        
        <div class="teacher-info" id="teacherInfo">
            <div class="teacher-avatar" id="teacherAvatar">
                <i class="fas fa-chalkboard-teacher"></i>
            </div>
            <div class="teacher-details">
                <h3 id="teacherName">Dr. Carlos Rodríguez</h3>
                <p id="teacherEmail">carlos.rodriguez@universidad.edu</p>
            </div>
        </div>
        
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="materias.html"><i class="fas fa-book"></i> Mis Materias</a>
            <a href="actividades.html" class="active"><i class="fas fa-tasks"></i> Actividades</a>
            <a href="asistencia.html"><i class="fas fa-calendar-check"></i> Asistencia</a>
            <a href="calificaciones.html"><i class="fas fa-graduation-cap"></i> Calificaciones</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
        </div>
        
        <div class="sidebar-footer">
            <button onclick="cerrarSesion()" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </div>

    <main class="main-content-profesor">
        <div class="top-bar">
            <h1>Gestión de Actividades</h1>
            <div class="date-display">
                <i class="fas fa-calendar-alt"></i>
                <span id="fechaActualCompleta"></span>
            </div>
        </div>

        <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Administra tareas, proyectos y exámenes</h2>
            <button class="btn-login-buap" onclick="mostrarModalActividad()" style="width: auto; padding: 10px 20px;">
                <i class="fas fa-plus"></i> Nueva Actividad
            </button>
        </div>

        <!-- Filtros -->
        <div class="actividades-filtros">
            <button class="filtro-btn active" onclick="filtrarActividades('todas')">Todas</button>
            <button class="filtro-btn" onclick="filtrarActividades('tarea')">Tareas</button>
            <button class="filtro-btn" onclick="filtrarActividades('proyecto')">Proyectos</button>
            <button class="filtro-btn" onclick="filtrarActividades('examen')">Exámenes</button>
        </div>

        <!-- Selector de materia -->
        <div class="form-group" style="margin-bottom: 20px; max-width: 300px;">
            <label for="materiaFiltro">Filtrar por materia:</label>
            <select id="materiaFiltro" onchange="filtrarPorMateria()">
                <option value="todas">Todas las materias</option>
            </select>
        </div>

        <!-- Grid de actividades -->
        <div class="actividades-container" id="actividadesContainer">
            <!-- Se carga con JavaScript -->
        </div>

        <!-- Modal Nueva Actividad -->
        <div id="actividadModal" class="modal" style="display: none;">
            <div class="modal-content" style="max-width: 600px;">
                <div class="modal-header">
                    <h2>Nueva Actividad</h2>
                    <button class="close-modal" onclick="cerrarModalActividad()">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="actividadForm">
                        <div class="form-group">
                            <label for="actividadMateria">Materia</label>
                            <select id="actividadMateria" required>
                                <option value="">Seleccionar materia</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="actividadTipo">Tipo de Actividad</label>
                            <select id="actividadTipo" required>
                                <option value="">Seleccionar tipo</option>
                                <option value="tarea">Tarea</option>
                                <option value="proyecto">Proyecto</option>
                                <option value="examen">Examen</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="actividadTitulo">Título</label>
                            <input type="text" id="actividadTitulo" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="actividadDescripcion">Descripción</label>
                            <textarea id="actividadDescripcion" rows="3" required></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="actividadFecha">Fecha de Entrega</label>
                            <input type="date" id="actividadFecha" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="actividadValor">Valor (puntos)</label>
                            <input type="number" id="actividadValor" min="0" max="100" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="cerrarModalActividad()">Cancelar</button>
                    <button class="btn-login-buap" onclick="guardarActividad()">Guardar Actividad</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/actividades.js"></script>
</body>
</html>
