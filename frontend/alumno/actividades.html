<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Actividades</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><div class="university-logo"><i class="fas fa-university"></i></div><h2>Portal del Alumno</h2><p>BUAP - FCC</p></div>
        <div class="teacher-info"><div class="teacher-avatar"><i class="fas fa-user-graduate"></i></div><div class="teacher-details"><h3 id="userName">Cargando...</h3><p id="userEmail">...</p></div></div>
        <div class="sidebar-menu">
            <a href="dashboard.html" class="active"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="materias.html"><i class="fas fa-book"></i> Mis Materias</a>
            <a href="actividades.html"><i class="fas fa-tasks"></i> Actividades</a>
            <a href="asistencia.html"><i class="fas fa-calendar-check"></i> Asistencia QR</a>
            <a href="calificaciones.html"><i class="fas fa-graduation-cap"></i> Calificaciones</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
        </div>
        <div class="sidebar-footer"><button onclick="cerrarSesion()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button></div>
    </div>    
    <main class="main-content-profesor">
        <div class="top-bar"><h1>Actividades y Entregas</h1><div class="date-display"><i class="fas fa-calendar-alt"></i> <span id="fechaActualCompleta"></span></div></div>
        <div id="actividadesContainer" class="actividades-container"></div>
    </main>
    <!-- Modal para subir archivo -->
    <div id="modalEntrega" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h3>Subir entrega</h3>
            <form id="formEntrega" enctype="multipart/form-data">
                <input type="file" name="archivo" required accept=".pdf,.doc,.docx,.zip">
                <textarea name="comentario" placeholder="Comentario (opcional)"></textarea>
                <button type="submit" class="btn-login-buap">Subir</button>
            </form>
        </div>
    </div>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/actividades.js"></script>
</body>
</html>
