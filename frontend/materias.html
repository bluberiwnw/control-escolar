<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Materias - Portal del Profesor BUAP</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="university-logo">
                <i class="fas fa-university"></i>
            </div>
            <h2>Portal del Profesor</h2>
            <p>BUAP - FCC</p>
        </div>
        
        <div class="teacher-info" id="teacherInfo">
            <div class="teacher-avatar" id="teacherAvatar">
                <i class="fas fa-chalkboard-teacher"></i>
            </div>
            <div class="teacher-details">
                <h3 id="teacherName">Dr. Carlos Rodríguez</h3>
                <p id="teacherEmail">carlos.rodriguez@universidad.edu</p>
            </div>
        </div>
        
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="materias.html" class="active"><i class="fas fa-book"></i> Mis Materias</a>
            <a href="actividades.html"><i class="fas fa-tasks"></i> Actividades</a>
            <a href="asistencia.html"><i class="fas fa-calendar-check"></i> Asistencia</a>
            <a href="calificaciones.html"><i class="fas fa-graduation-cap"></i> Calificaciones</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
        </div>
        
        <div class="sidebar-footer">
            <button onclick="cerrarSesion()" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </div>

    <main class="main-content-profesor">
        <div class="top-bar">
            <h1>Mis Materias</h1>
            <div class="date-display">
                <i class="fas fa-calendar-alt"></i>
                <span id="fechaActualCompleta"></span>
            </div>
        </div>

        <div class="section-title">
            <h2>Materias Asignadas - Primavera 2026</h2>
        </div>

        <div id="materiasContainer" class="courses-grid">
            <!-- Se carga con JS -->
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/materias.js"></script>
</body>
</html>
