<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistencia QR</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar"><!-- igual --></div>
    <main class="main-content-profesor">
        <div class="top-bar"><h1>Asistencia con QR</h1><div class="date-display"><i class="fas fa-calendar-alt"></i> <span id="fechaActualCompleta"></span></div></div>
        <div class="asistencia-header">
            <select id="materiaSelect"></select>
            <input type="date" id="fechaAsistencia">
            <button class="btn-login-buap" onclick="generarQR()">Generar QR</button>
        </div>
        <div id="qrContainer" style="text-align:center;"></div>
        <div class="asistencia-tabla"><table><thead><tr><th>Matrícula</th><th>Nombre</th><th>Estado</th></tr></thead><tbody id="listaEstudiantes"></tbody></table></div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/asistencia.js"></script>
</body>
</html>
