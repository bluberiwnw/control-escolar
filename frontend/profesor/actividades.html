<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="">
    <title>Actividades</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Abrir menú"><i class="fas fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay" hidden></div>
    <aside class="sidebar" id="appSidebar">
        <div class="sidebar-header"><div class="university-logo"><i class="fas fa-university"></i></div><h2>Portal del Profesor</h2><p>BUAP · FCC</p></div>
        <div class="teacher-info"><div class="teacher-avatar"><i class="fas fa-chalkboard-teacher"></i></div><div class="teacher-details"><h3 id="userName"></h3><p id="userEmail"></p></div></div>
        <nav class="sidebar-menu">
            <a data-nav="dashboard" href="dashboard.html"><span class="nav-emoji" aria-hidden="true">📊</span> Dashboard</a>
            <a data-nav="materias" href="materias.html"><span class="nav-emoji" aria-hidden="true">📚</span> Mis Materias</a>
            <a data-nav="actividades" href="actividades.html"><span class="nav-emoji" aria-hidden="true">✏️</span> Actividades</a>
            <a data-nav="asistencia" href="asistencia.html"><span class="nav-emoji" aria-hidden="true">📅</span> Asistencia</a>
            <a data-nav="calificaciones" href="calificaciones.html"><span class="nav-emoji" aria-hidden="true">📈</span> Calificaciones</a>
            <a data-nav="reportes" href="reportes.html"><span class="nav-emoji" aria-hidden="true">📑</span> Reportes</a>
        </nav>
        <div class="sidebar-footer"><button type="button" onclick="cerrarSesion()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button></div>
    </aside>     
    <main class="main-content-profesor">
        <div class="app-page-shell">
        <div class="top-bar"><h1>Actividades</h1><div class="date-display"><i class="fas fa-calendar-alt"></i> <span id="fechaActualCompleta"></span></div></div>
        <button type="button" class="btn btn-primary" onclick="mostrarModalActividad()" style="margin-bottom:20px;"><i class="fas fa-plus"></i> Nueva actividad</button>
        <div id="actividadesContainer"></div>
        <section class="panel-section" style="margin-top: 2rem;">
            <div class="panel-section__head"><h2>Entregas de alumnos</h2></div>
            <div class="panel-card" style="margin-bottom: 1rem;">
                <div class="form-group-modern">
                    <label for="filtroMateriaEntregas">Materia</label>
                    <select id="filtroMateriaEntregas" onchange="cargarEntregasProfesor()"></select>
                </div>
            </div>
            <div id="entregasProfesorContainer" class="table-responsive-wrap"></div>
        </section>
        </div>
    </main>
    <div id="actividadModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Nueva Actividad</h2>
            <button class="close-modal" onclick="cerrarModal()">&times;</button>
        </div>
        <form id="actividadForm" onsubmit="guardarActividad(event)">
            <div class="form-group-modern">
                <label>Materia</label>
                <select id="actividadMateria" required></select>
            </div>
            <div class="form-group-modern">
                <label>Tipo</label>
                <select id="actividadTipo" required>
                    <option value="tarea">Tarea</option>
                    <option value="proyecto">Proyecto</option>
                    <option value="examen">Examen</option>
                </select>
            </div>
            <div class="form-group-modern">
                <label>Título</label>
                <input type="text" id="actividadTitulo" required minlength="4" maxlength="120">
            </div>
            <div class="form-group-modern">
                <label>Descripción</label>
                <textarea id="actividadDescripcion" rows="3" maxlength="600"></textarea>
            </div>
            <div class="form-group-modern">
                <label>Fecha entrega</label>
                <input type="date" id="actividadFecha" required>
            </div>
            <div class="form-group-modern">
                <label>Valor (pts)</label>
                <input type="number" id="actividadValor" min="1" max="100" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>
    <div id="modalRetroEntrega" class="modal" style="display:none;">
        <div class="modal-content modal-content--wide">
            <div class="modal-header">
                <h2>Retroalimentación a la entrega</h2>
                <button type="button" class="close-modal" onclick="cerrarModalRetroEntrega()">&times;</button>
            </div>
            <form id="formRetroEntrega" onsubmit="guardarRetroEntrega(event)">
                <input type="hidden" id="retroEntregaId">
                <div class="form-group-modern">
                    <label for="retroComentario">Comentario</label>
                    <textarea id="retroComentario" rows="3" maxlength="500"></textarea>
                </div>
                <div class="form-group-modern">
                    <label for="retroCalificacion">Calificación (0–100, opcional)</label>
                    <input type="number" id="retroCalificacion" min="0" max="100" step="0.01" placeholder="Ej. 90">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-ghost" onclick="cerrarModalRetroEntrega()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    <button type="button" class="theme-toggle" data-theme-icon onclick="toggleTheme()" aria-label="Tema"><i class="fas fa-moon"></i></button>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app-shell.js"></script>
    <script src="js/actividades.js"></script>
</body>
</html>
