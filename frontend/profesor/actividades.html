<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividades</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><div class="university-logo"><i class="fas fa-university"></i></div><h2>Portal del Profesor</h2><p>BUAP - FCC</p></div>
        <div class="teacher-info"><div class="teacher-avatar"><i class="fas fa-chalkboard-teacher"></i></div><div class="teacher-details"><h3 id="userName">Cargando...</h3><p id="userEmail">...</p></div></div>
        <div class="sidebar-menu">
            <a href="dashboard.html" class="active"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="materias.html"><i class="fas fa-book"></i> Mis Materias</a>
            <a href="actividades.html"><i class="fas fa-tasks"></i> Actividades</a>
            <a href="asistencia.html"><i class="fas fa-calendar-check"></i> Asistencia</a>
            <a href="calificaciones.html"><i class="fas fa-graduation-cap"></i> Calificaciones</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
        </div>
        <div class="sidebar-footer"><button onclick="cerrarSesion()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button></div>
    </div>     
    <main class="main-content-profesor">
        <div class="top-bar"><h1>Actividades</h1><div class="date-display"><i class="fas fa-calendar-alt"></i> <span id="fechaActualCompleta"></span></div></div>
        <button class="btn-login-buap" onclick="mostrarModalActividad()" style="width:auto; margin-bottom:20px;">+ Nueva Actividad</button>
        <div id="actividadesContainer"></div>
    </main>
    <div id="modalActividad" class="modal" style="display:none;"><div class="modal-content"><span class="close" onclick="cerrarModal()">&times;</span><h2>Nueva Actividad</h2><form id="formActividad">...</form></div></div>
    
    <div id="actividadModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Nueva Actividad</h2>
            <button class="close-modal" onclick="cerrarModal()">&times;</button>
        </div>
        <form id="actividadForm">
            <div class="form-group">
                <label>Materia</label>
                <select id="actividadMateria" required></select>
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="actividadTipo" required>
                    <option value="tarea">Tarea</option>
                    <option value="proyecto">Proyecto</option>
                    <option value="examen">Examen</option>
                </select>
            </div>
            <div class="form-group">
                <label>Título</label>
                <input type="text" id="actividadTitulo" required>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea id="actividadDescripcion" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label>Fecha entrega</label>
                <input type="date" id="actividadFecha" required>
            </div>
            <div class="form-group">
                <label>Valor (pts)</label>
                <input type="number" id="actividadValor" min="0" max="100" required>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" class="btn-login-buap">Guardar</button>
            </div>
        </form>
    </div>
</div>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/actividades.js"></script>
</body>
</html>
