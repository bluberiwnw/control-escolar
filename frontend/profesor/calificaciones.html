<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calificaciones - Profesor</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Abrir menú"><i class="fas fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay" hidden></div>
    <aside class="sidebar" id="appSidebar">
        <div class="sidebar-header"><div class="university-logo"><i class="fas fa-university"></i></div><h2>Portal del Profesor</h2><p>BUAP · FCC</p></div>
        <div class="teacher-info"><div class="teacher-avatar"><i class="fas fa-chalkboard-teacher"></i></div><div class="teacher-details"><h3 id="userName"></h3><p id="userEmail"></p></div></div>
        <nav class="sidebar-menu">
            <a data-nav="dashboard" href="dashboard.html"><span class="nav-emoji" aria-hidden="true">📊</span> Dashboard</a>
            <a data-nav="materias" href="materias.html"><span class="nav-emoji" aria-hidden="true">📚</span> Mis Materias</a>
            <a data-nav="actividades" href="actividades.html"><span class="nav-emoji" aria-hidden="true">✏️</span> Actividades</a>
            <a data-nav="asistencia" href="asistencia.html"><span class="nav-emoji" aria-hidden="true">📅</span> Asistencia</a>
            <a data-nav="calificaciones" href="calificaciones.html"><span class="nav-emoji" aria-hidden="true">📈</span> Calificaciones</a>
            <a data-nav="reportes" href="reportes.html"><span class="nav-emoji" aria-hidden="true">📑</span> Reportes</a>
        </nav>
        <div class="sidebar-footer"><button type="button" onclick="cerrarSesion()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button></div>
    </aside> 
    <main class="main-content-profesor">
        <div class="top-bar"><h1>Registro de Calificaciones</h1><div class="date-display"><i class="fas fa-calendar-alt"></i> <span id="fechaActualCompleta"></span></div></div>
        <div class="panel-card">
            <div class="form-group-modern"><label>Materia</label><select id="materiaSelect"></select></div>
            <div class="form-group-modern"><label>Tipo</label><select id="tipoSelect"><option value="tarea">Tarea</option><option value="proyecto">Proyecto</option><option value="examen">Examen</option></select></div>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-cloud-upload-alt"></i><h3>Subir calificaciones (Excel/CSV)</h3>
        <p>Formato requerido: columnas <strong>"Materia", "Nombre", "Calificacion"</strong></p>
        <input type="file" id="fileInput" style="display:none" accept=".xlsx,.xls,.csv" onchange="previsualizarArchivo(this)">
    </div>
    <div id="previewTable" style="margin-top: 20px; overflow-x:auto;"></div>
    <div id="resultadoUpload"></div>
        </div>
        <div class="historial-archivos"><h3>Archivos subidos</h3><div id="archivosList"></div></div>
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app-shell.js"></script>
    <script src="js/calificaciones.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</body>
</html>
