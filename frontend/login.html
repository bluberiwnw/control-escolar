<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Iniciar sesión - Sistema Escolar BUAP</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Estilos exclusivos para el login con colores BUAP */
        body.login-page {
            background: linear-gradient(135deg, #0f2b3d 0%, #1b4f6e 100%);
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        .spotify-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease;
        }
        .login-card:hover {
            transform: scale(1.01);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-area i {
            font-size: 56px;
            color: #003366;
            background: rgba(0, 51, 102, 0.1);
            padding: 16px;
            border-radius: 60px;
        }
        .logo-area h1 {
            font-size: 32px;
            font-weight: 800;
            color: #003366;
            margin-top: 12px;
        }
        .logo-area p {
            color: #4a5568;
            font-size: 14px;
            margin-top: 8px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: #f7fafc;
            border-radius: 40px;
            margin-bottom: 20px;
            padding: 4px 20px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .input-group:focus-within {
            border-color: #003366;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }
        .input-group i {
            color: #718096;
            font-size: 18px;
            margin-right: 12px;
        }
        .input-group input {
            background: transparent;
            border: none;
            padding: 14px 0;
            width: 100%;
            color: #1a202c;
            font-size: 16px;
            outline: none;
        }
        .input-group input::placeholder {
            color: #a0aec0;
        }
        .btn-login {
            width: 100%;
            background: #003366;
            border: none;
            border-radius: 40px;
            padding: 14px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            margin-top: 16px;
        }
        .btn-login:hover {
            background: #002244;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 51, 102, 0.3);
        }
        .btn-login i {
            transition: transform 0.2s;
        }
        .btn-login:hover i {
            transform: translateX(5px);
        }
        .login-footer {
            text-align: center;
            margin-top: 32px;
            color: #718096;
            font-size: 12px;
        }
        .test-credentials {
            margin-top: 24px;
            background: #f1f5f9;
            border-radius: 20px;
            padding: 12px;
            font-size: 11px;
            color: #4a5568;
            text-align: center;
        }
        .test-credentials i {
            margin-right: 6px;
            color: #003366;
        }
        .alert {
            padding: 12px;
            border-radius: 40px;
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        .alert-error {
            background: #fed7d7;
            color: #c53030;
            border: 1px solid #feb2b2;
        }
        .alert-success {
            background: #c6f6d5;
            color: #276749;
            border: 1px solid #9ae6b4;
        }
        @media (max-width: 560px) {
            .login-card {
                padding: 32px 24px;
            }
            .logo-area i {
                font-size: 48px;
            }
            .logo-area h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body class="login-page">
    <div class="spotify-login-container">
        <div class="login-card">
            <div class="logo-area">
                <i class="fas fa-university"></i>
                <h1>BUAP</h1>
                <p>Facultad de Ciencias de la Computación</p>
            </div>
            <form onsubmit="handleLogin(event)" class="login-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-login">Iniciar sesión <i class="fas fa-arrow-right"></i></button>
            </form>
            <div id="alertContainer" class="alert" style="display: none;"></div>
            <div class="login-footer">
                <p>© 2026 Benemérita Universidad Autónoma de Puebla</p>
            </div>
            <div class="test-credentials">
                <p><i class="fas fa-user-graduate"></i> Admin: admin@universidad.edu / admin123</p>
                <p><i class="fas fa-chalkboard-user"></i> Profesor: profesor@universidad.edu / profesor123</p>
                <p><i class="fas fa-user"></i> Alumno: juan.perez@estudiante.edu / alumno123</p>
            </div>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
