<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portal Académico BUAP</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="spotify-login-container">
        <div class="login-card">
            <div class="logo-area">
                <i class="fas fa-university"></i>
                <h1>BUAP</h1>
                <p>Facultad de Ciencias de la Computación</p>
            </div>
            <form onsubmit="handleLogin(event)" class="login-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-login">Iniciar sesión <i class="fas fa-arrow-right"></i></button>
            </form>
            <div id="alertContainer" class="alert" style="display: none;"></div>
            <div class="login-footer">
                <p>© 2026 Benemérita Universidad Autónoma de Puebla</p>
            </div>
            <!-- Credenciales de prueba (solo desarrollo) -->
            <div class="test-credentials">
                <p>Admin: admin@universidad.edu / admin123</p>
                <p>Profesor: profesor@universidad.edu / profesor123</p>
                <p>Alumno: juan.perez@estudiante.edu / alumno123</p>
            </div>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
