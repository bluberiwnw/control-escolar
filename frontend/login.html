<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal del Profesor - BUAP</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container-buap">
        <div class="login-card-buap">
            <div class="login-header">
                <div class="university-logo-large">
                    <i class="fas fa-university"></i>
                </div>
                <h1>Portal del Profesor</h1>
                <p>Benemérita Universidad Autónoma de Puebla</p>
                <p class="facultad">Facultad de Ciencias de la Computación</p>
            </div>
            
            <form onsubmit="handleLogin(event)" class="login-form">
                <div class="form-group-buap">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Correo Electrónico
                    </label>
                    <input type="email" id="email" placeholder="profesor@universidad.edu" required>
                </div>
                
                <div class="form-group-buap">
                    <label for="password">
                        <i class="fas fa-lock"></i> Contraseña
                    </label>
                    <input type="password" id="password" placeholder="********" required>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox"> Recordarme
                        <span class="checkmark"></span>
                    </label>
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit" class="btn-login-buap">
                    Iniciar Sesión <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <div id="alertContainer" class="alert" style="display: none;"></div>
            
            <div class="login-footer">
                <p>Benemérita Universidad Autónoma de Puebla</p>
                <p class="version">Sistema de Gestión Académica v2.0</p>
            </div>
            
            <!-- Credenciales de prueba (solo para desarrollo) -->
            <div style="margin-top: 15px; text-align: center; font-size: 12px; color: #94a3b8;">
                <p>Usuario: profesor@universidad.edu | Contraseña: profesor123</p>
            </div>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
