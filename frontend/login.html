<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Iniciar sesión - Sistema Escolar BUAP</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Aseguramos que los estilos del login no se mezclen con la landing page */
        body.login-page {
            background: radial-gradient(circle at 30% 10%, #1f1f2e, #0a0a0c);
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        .spotify-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 56px 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
        }
        .login-card:hover {
            transform: scale(1.01);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 48px;
        }
        .logo-area i {
            font-size: 64px;
            color: #1db954;
            background: rgba(29, 185, 84, 0.12);
            padding: 20px;
            border-radius: 80px;
            margin-bottom: 16px;
        }
        .logo-area h1 {
            font-size: 36px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }
        .logo-area p {
            color: #b3b3b3;
            font-size: 14px;
            margin-top: 8px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: #2a2a2f;
            border-radius: 48px;
            margin-bottom: 20px;
            padding: 6px 20px;
            border: 1px solid #3a3a40;
            transition: all 0.2s;
        }
        .input-group:focus-within {
            border-color: #1db954;
            background: #1f1f24;
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.2);
        }
        .input-group i {
            color: #9b9b9b;
            font-size: 18px;
            margin-right: 12px;
        }
        .input-group input {
            background: transparent;
            border: none;
            padding: 16px 0;
            width: 100%;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .input-group input::placeholder {
            color: #7a7a7f;
            font-weight: 400;
        }
        .btn-login {
            width: 100%;
            background: #1db954;
            border: none;
            border-radius: 48px;
            padding: 14px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
            margin-top: 16px;
        }
        .btn-login:hover {
            background: #1ed760;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(29, 185, 84, 0.3);
        }
        .btn-login i {
            transition: transform 0.2s;
        }
        .btn-login:hover i {
            transform: translateX(6px);
        }
        .login-footer {
            text-align: center;
            margin-top: 32px;
            color: #6a6a6f;
            font-size: 12px;
        }
        .test-credentials {
            margin-top: 28px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 16px;
            font-size: 12px;
            color: #b3b3b3;
            text-align: center;
            line-height: 1.6;
        }
        .test-credentials i {
            margin-right: 6px;
            color: #1db954;
        }
        .alert {
            padding: 12px;
            border-radius: 48px;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        .alert-error {
            background: rgba(220, 53, 69, 0.15);
            color: #ff7b72;
            border: 1px solid rgba(220, 53, 69, 0.4);
        }
        .alert-success {
            background: rgba(29, 185, 84, 0.15);
            color: #1db954;
            border: 1px solid rgba(29, 185, 84, 0.4);
        }
        @media (max-width: 560px) {
            .login-card {
                padding: 32px 24px;
            }
            .logo-area i {
                font-size: 48px;
            }
            .logo-area h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body class="login-page">
    <div class="spotify-login-container">
        <div class="login-card">
            <div class="logo-area">
                <i class="fas fa-university"></i>
                <h1>BUAP</h1>
                <p>Facultad de Ciencias de la Computación</p>
            </div>
            <form onsubmit="handleLogin(event)" class="login-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-login">Iniciar sesión <i class="fas fa-arrow-right"></i></button>
            </form>
            <div id="alertContainer" class="alert" style="display: none;"></div>
            <div class="login-footer">
                <p>© 2026 Benemérita Universidad Autónoma de Puebla</p>
            </div>
            <div class="test-credentials">
                <p><i class="fas fa-user-graduate"></i> Admin: admin@universidad.edu / admin123</p>
                <p><i class="fas fa-chalkboard-user"></i> Profesor: profesor@universidad.edu / profesor123</p>
                <p><i class="fas fa-user"></i> Alumno: juan.perez@estudiante.edu / alumno123</p>
            </div>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
