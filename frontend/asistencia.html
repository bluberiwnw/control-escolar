<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia - Portal del Profesor BUAP</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <!-- Mismo sidebar -->
        <div class="sidebar-header">
            <div class="university-logo">
                <i class="fas fa-university"></i>
            </div>
            <h2>Portal del Profesor</h2>
            <p>BUAP - FCC</p>
        </div>
        
        <div class="teacher-info">
            <div class="teacher-avatar">
                <i class="fas fa-chalkboard-teacher"></i>
            </div>
            <div class="teacher-details">
                <h3 id="teacherName">Dr. Carlos Rodríguez</h3>
                <p id="teacherEmail">carlos.rodriguez@universidad.edu</p>
            </div>
        </div>
        
        <div class="sidebar-menu">
            <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="materias.html"><i class="fas fa-book"></i> Mis Materias</a>
            <a href="actividades.html"><i class="fas fa-tasks"></i> Actividades</a>
            <a href="asistencia.html" class="active"><i class="fas fa-calendar-check"></i> Asistencia</a>
            <a href="calificaciones.html"><i class="fas fa-graduation-cap"></i> Calificaciones</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
        </div>
        
        <div class="sidebar-footer">
            <button onclick="cerrarSesion()" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </div>

    <main class="main-content-profesor">
        <div class="top-bar">
            <h1>Control de Asistencia</h1>
            <div class="date-display">
                <i class="fas fa-calendar-alt"></i>
                <span id="fechaActualCompleta"></span>
            </div>
        </div>

        <div class="asistencia-header">
            <div class="form-group" style="flex: 2;">
                <label>Seleccionar Materia</label>
                <select id="materiaSelect" onchange="cargarListaAsistencia()">
                    <option value="">Seleccionar materia</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Fecha de Clase</label>
                <input type="date" id="fechaAsistencia" onchange="cargarListaAsistencia()">
            </div>
            <button class="btn-login-buap" onclick="guardarAsistencia()" style="padding: 12px 25px;">
                <i class="fas fa-save"></i> Guardar
            </button>
        </div>

        <div class="asistencia-tabla">
            <table>
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>Matrícula</th>
                        <th>Nombre del Estudiante</th>
                        <th>Asistencia</th>
                    </tr>
                </thead>
                <tbody id="listaEstudiantes">
                    <!-- Se carga con JavaScript -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/asistencia.js"></script>
</body>
</html>
